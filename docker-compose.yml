services:
  mongo:
    image: mongo:8.0
    container_name: micro-ats-mongo
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    environment:
      # Work around the MongoDB 8.x + Linux kernel 6.19+ TCMalloc/rseq crash
      # (SERVER-121912). Docker Desktop / OrbStack ship kernel >= 6.19; forcing
      # glibc rseq registration lets mongod pass its startup compatibility check.
      GLIBC_TUNABLES: "glibc.pthread.rseq=1"
    ports:
      - "27017:27017"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # Idempotent: rs.status() throws until the set is initiated, then we initiate once.
      test: >
        echo "try { rs.status() } catch (e) {
          rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'host.docker.internal:27017' }] })
        }" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      start_period: 0s
      start_interval: 1s
      retries: 30
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb

volumes:
  mongo_data:
  mongo_config:
